name: Docker CI/CD

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:

  docker:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Install YC CLI
        run: |
          curl https://storage.yandexcloud.net/yandexcloud-yc/install.sh | bash
          echo "$HOME/yandex-cloud/bin" >> $GITHUB_PATH

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure YC
        run: |
          echo '${{ secrets.YC_SERVICE_ACCOUNT_KEY }}' > key.json
          yc config profile create github
          yc config set service-account-key key.json
          yc config set cloud-id ${{ secrets.YC_CLOUD_ID }}
          yc config set folder-id ${{ secrets.YC_FOLDER_ID }}

      - name: Create backend config
        working-directory: terraform
        run: |
          cat > backend.hcl <<EOF
          access_key = "${{ secrets.YC_ACCESS_KEY }}"
          secret_key = "${{ secrets.YC_SECRET_KEY }}"
          EOF

      - name: Terraform Init
        working-directory: terraform
        run: terraform init -backend-config=backend.hcl

      - name: Get Kubernetes credentials
        working-directory: terraform
        run: |
          CLUSTER_ID=$(terraform output -raw kubernetes_cluster_id)

          yc managed-kubernetes cluster get-credentials \
            --id "$CLUSTER_ID" \
            --external \
            --force


      - name: Configure Docker
        run: |
          yc container registry configure-docker

      - name: Set image tag
        run: |
          echo "IMAGE_TAG=$(echo ${GITHUB_SHA} | cut -c1-8)" >> $GITHUB_ENV

      - name: Build image
        run: |
          docker build \
            -t cr.yandex/${{ secrets.REGISTRY_ID }}/diplom-app:${{ env.IMAGE_TAG }} \
            ./app

      - name: Push image
        run: |
          docker push \
            cr.yandex/${{ secrets.REGISTRY_ID }}/diplom-app:${{ env.IMAGE_TAG }}

      - name: Update deployment
        run: |
          kubectl set image deployment/diplom-app \
            diplom-app=cr.yandex/${{ secrets.REGISTRY_ID }}/diplom-app:${{ env.IMAGE_TAG }} \
            -n diplom-app

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/diplom-app \
            -n diplom-app \
            --timeout=300s
